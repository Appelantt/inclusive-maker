# Configuration générale du projet Inclousive Maker

project:
  name: "inclousive-maker"
  version: "0.1.0"
  mode: "demo"  # demo | acquisition | remote

eeg:
  device: "unicorn_hybrid_black"  # unicorn_hybrid_black | generator
  sampling_rate: 250
  channel_count: 8
  include_accel: false
  include_gyro: false
  include_aux: false

processing:
  bandpass:
    low: 1.0
    high: 30.0
  notch:
    - [48.0, 52.0]
    - [58.0, 62.0]
  window_size_ms: 1000
  overlap_ms: 500

features:
  bands:
    delta: [0.5, 4.0]
    theta: [4.0, 8.0]
    alpha: [8.0, 13.0]
    beta: [13.0, 30.0]
  method: "bandpower"

brain_algo:
  states:
    - "OPEN"
    - "CLOSE"
    - "IDLE"
  classifier: "threshold"  # threshold | sklearn
  smoothing_window: 5

remote_command:
  protocol: "udp"  # udp | websocket | lsl
  udp:
    ip: "127.0.0.1"
    port: 56000
  websocket:
    host: "127.0.0.1"
    port: 8765
  lsl:
    stream_name: "inclousive_maker_commands"

logging:
  level: "INFO"
